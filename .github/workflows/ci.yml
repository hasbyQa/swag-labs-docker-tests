name: Swag Labs Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t swag-labs-tests .

      - name: Run tests in container
        continue-on-error: true
        run: |
          docker run --name test-run swag-labs-tests || true
          docker cp test-run:/app/target/surefire-reports ./surefire-reports || true
          docker rm test-run

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: surefire-reports/
          if-no-files-found: ignore

      - name: Parse test results
        if: always()
        id: results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; ERRORS=0; SKIPPED=0

          for f in surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            e=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1)
            s=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1)
            TOTAL=$((TOTAL   + ${t:-0}))
            FAILED=$((FAILED + ${fa:-0}))
            ERRORS=$((ERRORS + ${e:-0}))
            SKIPPED=$((SKIPPED + ${s:-0}))
          done

          PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))

          # Extract only failed/errored test names using python inline (one-liner safe in YAML)
          FAILED_NAMES=$(python3 -c "
          import os, xml.etree.ElementTree as ET, glob
          names = []
          for f in glob.glob('surefire-reports/TEST-*.xml'):
              for tc in ET.parse(f).findall('testcase'):
                  if tc.find('failure') is not None or tc.find('error') is not None:
                      names.append(tc.get('name',''))
          print(', '.join(names) if names else 'All tests passed!')
          ")

          if [ $((FAILED + ERRORS)) -eq 0 ]; then
            STATUS="PASSED"
            EMOJI="✅"
            COLOR="good"
          else
            STATUS="FAILED"
            EMOJI="❌"
            COLOR="danger"
          fi

          echo "total=$TOTAL"           >> $GITHUB_OUTPUT
          echo "passed=$PASSED"         >> $GITHUB_OUTPUT
          echo "failed=$FAILED"         >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"         >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"       >> $GITHUB_OUTPUT
          echo "status=$STATUS"         >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI"           >> $GITHUB_OUTPUT
          echo "color=$COLOR"           >> $GITHUB_OUTPUT
          echo "failed_names=$FAILED_NAMES" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: >-
            {
              "attachments": [
                {
                  "color": "${{ steps.results.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.results.outputs.emoji }} ${{ steps.results.outputs.status }} — Swag Labs Test Suite",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                        { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Commit:*\n${{ github.event.head_commit.message }}" }
                      ]
                    },
                    { "type": "divider" },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Total:*\n${{ steps.results.outputs.total }}" },
                        { "type": "mrkdwn", "text": "*Passed:*\n${{ steps.results.outputs.passed }}" },
                        { "type": "mrkdwn", "text": "*Failed:*\n${{ steps.results.outputs.failed }}" },
                        { "type": "mrkdwn", "text": "*Errors:*\n${{ steps.results.outputs.errors }}" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*🔥 Failed Test Details:*\n${{ steps.results.outputs.failed_names }}"
                      }
                    },
                    { "type": "divider" },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "style": "primary",
                          "text": { "type": "plain_text", "text": "View Run Details", "emoji": true },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: CI Test Bot <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ steps.results.outputs.emoji }} ${{ steps.results.outputs.status }} - ${{ github.repository }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:620px;margin:auto;border:1px solid #ddd;border-radius:8px;overflow:hidden;">
              <div style="background:${{ steps.results.outputs.status == 'PASSED' && '#2eb67d' || '#e01e5a' }};padding:28px;text-align:center;">
                <h1 style="color:white;margin:0;font-size:26px;">${{ steps.results.outputs.emoji }} ${{ steps.results.outputs.status }}</h1>
                <p style="color:white;margin:8px 0 0;font-size:15px;">Swag Labs Test Suite</p>
              </div>
              <div style="padding:24px;background:#f9f9f9;">
                <table style="width:100%;border-collapse:collapse;">
                  <tr><td style="padding:8px;font-weight:bold;color:#555;width:130px;">Repository</td><td style="padding:8px;">${{ github.repository }}</td></tr>
                  <tr style="background:#fff;"><td style="padding:8px;font-weight:bold;color:#555;">Branch</td><td style="padding:8px;">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px;font-weight:bold;color:#555;">Commit</td><td style="padding:8px;">${{ github.event.head_commit.message }}</td></tr>
                  <tr style="background:#fff;"><td style="padding:8px;font-weight:bold;color:#555;">Triggered by</td><td style="padding:8px;">${{ github.actor }}</td></tr>
                </table>
              </div>
              <div style="padding:24px;">
                <h2 style="margin:0 0 16px;font-size:18px;">Test Results</h2>
                <table style="width:100%;border-collapse:collapse;text-align:center;">
                  <thead>
                    <tr style="background:#f0f0f0;">
                      <th style="padding:10px;border:1px solid #ddd;">Total</th>
                      <th style="padding:10px;border:1px solid #ddd;color:#2eb67d;">Passed</th>
                      <th style="padding:10px;border:1px solid #ddd;color:#e01e5a;">Failed</th>
                      <th style="padding:10px;border:1px solid #ddd;color:#e8a838;">Errors</th>
                      <th style="padding:10px;border:1px solid #ddd;color:#888;">Skipped</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td style="padding:10px;border:1px solid #ddd;font-weight:bold;">${{ steps.results.outputs.total }}</td>
                      <td style="padding:10px;border:1px solid #ddd;color:#2eb67d;font-weight:bold;">${{ steps.results.outputs.passed }}</td>
                      <td style="padding:10px;border:1px solid #ddd;color:#e01e5a;font-weight:bold;">${{ steps.results.outputs.failed }}</td>
                      <td style="padding:10px;border:1px solid #ddd;color:#e8a838;font-weight:bold;">${{ steps.results.outputs.errors }}</td>
                      <td style="padding:10px;border:1px solid #ddd;color:#888;font-weight:bold;">${{ steps.results.outputs.skipped }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div style="padding:0 24px 24px;">
                <h2 style="margin:0 0 12px;font-size:18px;">🔥 Failed Test Details</h2>
                <div style="background:#fff5f5;border-left:4px solid #e01e5a;padding:12px 16px;border-radius:4px;font-size:14px;line-height:1.8;">
                  ${{ steps.results.outputs.failed_names }}
                </div>
              </div>
              <div style="padding:0 24px 28px;text-align:center;">
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                   style="background:#0366d6;color:white;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:bold;font-size:14px;">
                  View Full Run &amp; Download Artifacts
                </a>
              </div>
            </div>