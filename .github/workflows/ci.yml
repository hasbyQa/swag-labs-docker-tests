name: Swag Labs Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image
      - name: Build Docker image
        run: docker build -t swag-labs-tests .

      # Run tests and copy the surefire reports out of the container
      # We use a named container so we can copy from it after it exits
      - name: Run tests in container
        run: |
          docker run --name test-run swag-labs-tests || true
          docker cp test-run:/app/target/surefire-reports ./surefire-reports || true
          docker rm test-run

      # Parse the surefire XML reports to get test counts for notifications
      - name: Parse test results
        if: always()
        id: results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; ERRORS=0; SKIPPED=0
          FAILED_TESTS=""

          for f in surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1); TOTAL=$((TOTAL + ${t:-0}))
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1); FAILED=$((FAILED + ${fa:-0}))
            e=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1); ERRORS=$((ERRORS + ${e:-0}))
            s=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1); SKIPPED=$((SKIPPED + ${s:-0}))

            # Collect names of failed/errored tests
            while IFS= read -r line; do
              FAILED_TESTS="${FAILED_TESTS}• ${line}\n"
            done < <(grep -oP '(?<=classname=")[^"]+\.[^"]+(?=")' "$f" | sort -u || true)
          done

          PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))
          [ $((FAILED + ERRORS)) -eq 0 ] && STATUS="PASSED ✅" || STATUS="FAILED ❌"
          [ $((FAILED + ERRORS)) -eq 0 ] && COLOR="good" || COLOR="danger"
          [ -z "$FAILED_TESTS" ] && FAILED_TESTS="• All tests passed!"

          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          echo "status=$STATUS"     >> $GITHUB_OUTPUT
          echo "color=$COLOR"       >> $GITHUB_OUTPUT
          # Multiline output needs special handling
          echo "failed_tests<<EOF"  >> $GITHUB_OUTPUT
          printf "%b" "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF"                >> $GITHUB_OUTPUT

      # Upload test reports as a downloadable artifact in the GitHub Actions UI
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: surefire-reports/
          if-no-files-found: ignore

      # Send a structured Slack notification
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.results.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.results.outputs.status }} — Swag Labs Test Suite"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                        { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Commit:*\n${{ github.event.head_commit.message }}" }
                      ]
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Total:*\n${{ steps.results.outputs.total }}" },
                        { "type": "mrkdwn", "text": "*Passed:*\n${{ steps.results.outputs.passed }}" },
                        { "type": "mrkdwn", "text": "*Failed:*\n${{ steps.results.outputs.failed }}" },
                        { "type": "mrkdwn", "text": "*Errors:*\n${{ steps.results.outputs.errors }}" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*🔥 Failed Test Details:*\n${{ steps.results.outputs.failed_tests }}"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Run Details" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Send a structured email notification via Gmail
      - name: Notify Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: CI Test Bot <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ steps.results.outputs.status }} - ${{ github.repository }}"
          convert_markdown: true
          body: |
            # ${{ steps.results.outputs.status }} — Swag Labs Test Suite

            | Field        | Value |
            |-------------|-------|
            | Repository  | ${{ github.repository }} |
            | Branch      | ${{ github.ref_name }} |
            | Commit      | ${{ github.event.head_commit.message }} |
            | Triggered by | ${{ github.actor }} |

            ## Test Results

            | Total | Passed | Failed | Errors | Skipped |
            |-------|--------|--------|--------|---------|
            | ${{ steps.results.outputs.total }} | ${{ steps.results.outputs.passed }} | ${{ steps.results.outputs.failed }} | ${{ steps.results.outputs.errors }} | ${{ steps.results.outputs.skipped }} |

            ## 🔥 Failed Test Details
            ${{ steps.results.outputs.failed_tests }}

            ## 📎 Test Reports
            Download the full surefire report artifact from the link below.

            [View Full Run & Download Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})